server {
    listen 80;
    server_name localhost;

    # Route API calls to the backend service
    location /bff {
        proxy_pass http://backend:5000; # 'backend' is the service name in docker-compose
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Route all other requests to the frontend service
    location / {
        proxy_pass http://frontend:3001; # 'frontend' is the service name, app runs on port 3001
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}