server {
    listen 80;
    server_name localhost; # Thay bằng domain khi deploy

    location /ai {
        # 'ai_service' là tên service trong docker-compose
        # 8000 là port mà AI service đang chạy bên trong container
        proxy_pass http://ai_service:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Chuyển hướng các request API của backend
    location /api {
        # 'backend' là tên service trong docker-compose
        # 3000 là port mà backend đang chạy bên trong container (theo Dockerfile)
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Phục vụ các file đã upload trực tiếp từ Nginx để giảm tải cho backend
    # '/uploads/' là URL path, alias trỏ đến thư mục trên volume của Nginx
    location /uploads/ {
        alias /var/www/uploads/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ =404;
    }

    # Chuyển hướng tất cả các request còn lại đến frontend
    location / {
        # 'frontend' là tên service trong docker-compose
        # 3001 là port mà frontend đang chạy bên trong container (theo Dockerfile)
        proxy_pass http://frontend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
