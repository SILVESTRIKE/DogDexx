version: '3.8'

networks:
  dogbreed_net:
    driver: bridge

services:
  nginx:
    image: nginx:stable-alpine
    container_name: dog_breed_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./backend/uploads:/var/www/uploads:ro
    depends_on:
      - frontend
      - backend
      - ai_service
    networks:
      - dogbreed_net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    container_name: dog_breed_frontend
    networks:
      - dogbreed_net
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dog_breed_backend
    volumes:
      - ./backend/uploads:/server/uploads
    networks:
      - dogbreed_net
    restart: unless-stopped
    depends_on:
      - ai_service
    env_file:
      - ./backend/.env
    environment:
      - AI_SERVICE_URL=http://ai_service:8000

  ai_service:
    build: ./ai_service
    container_name: dog_breed_ai_service
    networks:
      - dogbreed_net
    env_file:
      - ./backend/.env
    restart: unless-stopped
