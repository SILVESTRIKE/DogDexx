version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dog_breed_backend
    ports:
      - "3000:3000"
    volumes:
      - .:/server
      - ./public:/app/public
      - ./uploads:/app/uploads
    restart: unless-stopped # Thay đổi cho development
    depends_on:
      - mongo
    env_file:
      - .env
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    restart: unless-stopped # Thay đổi cho development
    volumes:
      - mongodata:/data/db
volumes:
  mongodata:
  
