version: "3.8"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Đổi tên container để rõ ràng hơn
    container_name: dog_breed_backend
    volumes:
      - .:/server
      - /server/node_modules # Ngăn node_modules ở local ghi đè lên container
    restart: unless-stopped
    depends_on:
      - ai-service
    env_file:
      - .env
    # Không cần expose port ra ngoài host nữa vì Nginx sẽ quản lý

  frontend:
    build:
      context: ../frontend # Trỏ đến thư mục frontend
      dockerfile: Dockerfile
    container_name: dog_breed_frontend
    restart: unless-stopped
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - ../frontend/.env.local # Sử dụng env của frontend
    # Không cần expose port ra ngoài host

  ai-service:
    build: ./ai_service
    container_name: dog_breed_ai_service
    env_file:
      - .env
    restart: unless-stopped
    # Nếu bạn có GPU và muốn dùng, hãy thêm cấu hình runtime
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  nginx:
    image: nginx:stable-alpine
    container_name: dog_breed_nginx
    ports:
      - "80:80"   # HTTP
      - "443:443" # HTTPS (nếu có)
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Volume để chia sẻ file upload từ backend cho Nginx phục vụ
      - ./uploads:/var/www/uploads
    depends_on:
      - app
      - frontend
    restart: unless-stopped
